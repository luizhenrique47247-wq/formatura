<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotações Formatura</title>

  <!-- Tailwind CSS Configuração para Dark Mode -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Map -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
        
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>

  <!-- Estilos Neomorfismo (Adaptado com Variáveis para Dark Mode) -->
  <style>
    :root {
      --neu-bg: #E0E5EC;
      --neu-shadow-d: rgba(163,177,198,0.6);
      --neu-shadow-l: rgba(255,255,255,0.5);
      --neu-shadow-d-in: rgba(163,177,198,0.7);
      --neu-shadow-l-in: rgba(255,255,255,0.8);
      --table-border: #D1D9E6;
      --table-row-hover: rgba(213, 219, 228, 0.5);
      --input-bg-focus: #E0E5EC;
    }

    /* Cores do Dark Mode */
    .dark {
      --neu-bg: #292D32;
      --neu-shadow-d: rgba(0,0,0,0.3);
      --neu-shadow-l: rgba(255,255,255,0.05);
      --neu-shadow-d-in: rgba(0,0,0,0.4);
      --neu-shadow-l-in: rgba(255,255,255,0.05);
      --table-border: #3B4048;
      --table-row-hover: rgba(59, 64, 72, 0.5);
      --input-bg-focus: #292D32;
    }

    body {
      background-color: var(--neu-bg);
      transition: background-color 0.3s ease;
    }
    
    .neu-flat { background: var(--neu-bg); box-shadow: 9px 9px 16px var(--neu-shadow-d), -9px -9px 16px var(--neu-shadow-l); border-radius: 1.25rem; }
    .neu-pressed { background: var(--neu-bg); box-shadow: inset 6px 6px 10px 0 var(--neu-shadow-d-in), inset -6px -6px 10px 0 var(--neu-shadow-l-in); border-radius: 0.75rem; border: none; outline: none; transition: all 0.2s; }
    .neu-pressed:focus { box-shadow: inset 8px 8px 12px 0 var(--neu-shadow-d-in), inset -8px -8px 12px 0 var(--neu-shadow-l-in); }
    .neu-btn { background: var(--neu-bg); box-shadow: 6px 6px 12px var(--neu-shadow-d), -6px -6px 12px var(--neu-shadow-l); border-radius: 0.75rem; transition: all 0.2s ease; cursor: pointer; border: none; font-weight: bold; }
    .neu-btn:active { box-shadow: inset 4px 4px 8px var(--neu-shadow-d-in), inset -4px -4px 8px var(--neu-shadow-l-in); }
    .neu-circle { background: var(--neu-bg); box-shadow: 4px 4px 8px var(--neu-shadow-d), -4px -4px 8px var(--neu-shadow-l); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
    .neu-circle:active { box-shadow: inset 3px 3px 6px var(--neu-shadow-d-in), inset -3px -3px 6px var(--neu-shadow-l-in); }
    
    .neu-badge-green { background: var(--neu-bg); box-shadow: 3px 3px 6px var(--neu-shadow-d), -3px -3px 6px var(--neu-shadow-l); border-radius: 9999px; border: 1px solid rgba(16, 185, 129, 0.2); }
    .neu-badge-red { background: var(--neu-bg); box-shadow: 3px 3px 6px var(--neu-shadow-d), -3px -3px 6px var(--neu-shadow-l); border-radius: 9999px; border: 1px solid rgba(239, 68, 68, 0.2); }
    
    .table-row-neu { border-bottom: 2px solid var(--table-border); transition: all 0.3s; }
    .table-row-neu:last-child { border-bottom: none; }
    .table-row-neu:hover:not(.bg-green-300):not(.bg-red-300) { background-color: var(--table-row-hover); }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--neu-bg); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #a3b1c6; border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
    ::-webkit-scrollbar-thumb:hover { background: #8b9bb4; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      GraduationCap, Wallet, ListTodo, Plus, Edit3, Trash2, 
      CheckCircle, Circle, TrendingDown, TrendingUp, Tag, X, Search, Info, AlertTriangle, Moon, Sun, Printer
    } from 'lucide-react';

    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously } from 'firebase/auth';
    import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc } from 'firebase/firestore';

    const firebaseConfig = {
      apiKey: "AIzaSyD0c_4NrQ1RgZUSuHl7orBLHPHFughYQN4",
      authDomain: "formatura-785b3.firebaseapp.com",
      projectId: "formatura-785b3",
      storageBucket: "formatura-785b3.firebasestorage.app",
      messagingSenderId: "4219252011",
      appId: "1:4219252011:web:0ce0fb9ed6fc07e034a96e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const defaultCategories = [
      "Adesivo", "Balão Fresco", "Boné", "Caneta", "Cardápio Caseiro",
      "Chaveiro", "Chinelo", "Copo", "Copo de shot", "Docinho", "Espelho",
      "Guardanapo de pano", "Guardanapo de papel", "Rasteirinha", "Sousplat", "Tirante"
    ];

    function App() {
      const [items, setItems] = useState([]);
      const [modalType, setModalType] = useState(null);
      const [isReady, setIsReady] = useState(false);
      const [searchTerm, setSearchTerm] = useState(''); 
      const [toastMessage, setToastMessage] = useState(null); 
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, title: '', message: '', action: null });
      const [showSplash, setShowSplash] = useState(true);

      // Controle de Dark Mode
      const [isDark, setIsDark] = useState(false);

      const [categoriesList, setCategoriesList] = useState(() => {
        const saved = localStorage.getItem('@formatura-categorias');
        if (saved) return JSON.parse(saved);
        return defaultCategories;
      });

      const formRef = useRef(null);

      // Inicia as preferências do Dark Mode ao carregar a página
      useEffect(() => {
        // Busca o que o usuário escolheu na última vez
        const theme = localStorage.getItem('theme');
        
        // Só ativa o Dark Mode se o usuário explicitamente escolheu e salvou 'dark' antes.
        // Se for a primeira vez acessando (theme é nulo), por padrão o app será Claro.
        if (theme === 'dark') {
          setIsDark(true);
          document.documentElement.classList.add('dark');
        } else {
          setIsDark(false);
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light'); // Garante que o padrão salvo é claro
        }
      }, []);

      const toggleTheme = () => {
        setIsDark(!isDark);
        if (!isDark) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      };

      useEffect(() => {
        localStorage.setItem('@formatura-categorias', JSON.stringify(categoriesList));
      }, [categoriesList]);

      useEffect(() => {
        const timer = setTimeout(() => setShowSplash(false), 2500);
        return () => clearTimeout(timer);
      }, []);

      const showToast = (message, type = 'success') => {
        setToastMessage({ message, type });
        setTimeout(() => setToastMessage(null), 5000);
      };

      useEffect(() => {
        signInAnonymously(auth).then(() => {
          const colRef = collection(db, 'cotacoes');
          const unsubscribe = onSnapshot(colRef, 
            (snapshot) => {
              const data = [];
              snapshot.forEach(d => data.push({ id: d.id, ...d.data() }));
              setItems(data);
              setIsReady(true);
            }, 
            (error) => {
              console.error("Erro Firebase:", error);
              showToast("Erro ao conectar ao banco de dados.", "error");
            }
          );
          return () => unsubscribe();
        }).catch(error => {
          console.error("Erro Auth:", error);
          if (error.code === 'auth/configuration-not-found' || error.code === 'auth/operation-not-allowed') {
            showToast("Erro: Ative o método de login 'Anônimo' no painel do Firebase Authentication!", "error");
          } else {
            showToast(`Erro de Autenticação: ${error.message}`, "error");
          }
        });
      }, []);

      const [formData, setFormData] = useState({
        itemName: '', color: '', quantity: '', city: '', supplier: '', unitPrice: '', isBought: false, notes: ''
      });

      const [isEditing, setIsEditing] = useState(null);
      const [isDropdownOpen, setIsDropdownOpen] = useState(false);

      const groupedItems = useMemo(() => {
        const groups = {};
        
        categoriesList.forEach(itemName => {
          groups[itemName.toLowerCase()] = { originalName: itemName, items: [] };
        });

        const filteredItems = items.filter(item => {
          const searchLower = searchTerm.toLowerCase();
          return item.itemName.toLowerCase().includes(searchLower) || 
                 (item.supplier && item.supplier.toLowerCase().includes(searchLower)) ||
                 (item.city && item.city.toLowerCase().includes(searchLower)) ||
                 (item.color && item.color.toLowerCase().includes(searchLower)) ||
                 (item.notes && item.notes.toLowerCase().includes(searchLower));
        });

        filteredItems.forEach(item => {
          const key = item.itemName.trim().toLowerCase();
          if (!groups[key]) {
            groups[key] = { originalName: item.itemName, items: [] };
          }
          groups[key].items.push(item);
        });

        let sortedGroups = Object.values(groups).sort((a, b) => a.originalName.localeCompare(b.originalName));
        if (searchTerm) {
          const searchLower = searchTerm.toLowerCase();
          sortedGroups = sortedGroups.filter(g => g.items.length > 0 || g.originalName.toLowerCase().includes(searchLower));
        }

        sortedGroups.forEach(group => {
          if (group.items.length > 0) {
            const unitPrices = group.items.map(i => Number(i.unitPrice));
            group.minPrice = Math.min(...unitPrices);
            group.maxPrice = Math.max(...unitPrices);
          }
        });

        return sortedGroups;
      }, [items, searchTerm, categoriesList]);

      const totals = useMemo(() => {
        let spent = 0;
        let budgeted = 0;
        let spentItems = [];
        let budgetedItems = [];

        const rawGroups = {};
        items.forEach(item => {
          const key = item.itemName.trim().toLowerCase();
          if (!rawGroups[key]) rawGroups[key] = { items: [] };
          rawGroups[key].items.push(item);
        });

        Object.values(rawGroups).forEach(group => {
          if (group.items.length === 0) return; 

          const boughtItem = group.items.find(i => i.isBought);
          
          if (boughtItem) {
            spent += (Number(boughtItem.quantity) * Number(boughtItem.unitPrice));
            spentItems.push(boughtItem);
          } else {
            let cheapest = group.items[0];
            let lowestTotal = Number(cheapest.quantity) * Number(cheapest.unitPrice);
            
            group.items.forEach(i => {
               const total = Number(i.quantity) * Number(i.unitPrice);
               if (total < lowestTotal) {
                  lowestTotal = total;
                  cheapest = i;
               }
            });

            budgeted += lowestTotal;
            budgetedItems.push(cheapest);
          }
        });

        return { spent, budgeted, spentItems, budgetedItems };
      }, [items]);

      const formatCurrency = (value) => {
        return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
      };

      const handleInputChange = (e) => {
        const { name, value, type, checked } = e.target;
        setFormData(prev => ({
          ...prev,
          [name]: type === 'checkbox' ? checked : value
        }));
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!formData.itemName || !formData.unitPrice || !formData.quantity) return;

        const newItem = {
          ...formData,
          quantity: Number(formData.quantity),
          unitPrice: Number(formData.unitPrice),
          createdAt: new Date().toISOString()
        };

        const colRef = collection(db, 'cotacoes');
        
        try {
          if (isEditing) {
            await updateDoc(doc(db, 'cotacoes', isEditing), newItem);
            showToast("Cotação atualizada com sucesso!");
          } else {
            await addDoc(colRef, newItem);
            showToast("Nova cotação adicionada!");
          }

          const newCat = formData.itemName.trim();
          if (!categoriesList.some(c => c.toLowerCase() === newCat.toLowerCase())) {
            setCategoriesList(prev => [...prev, newCat]);
          }

        } catch (error) {
          showToast("Erro ao salvar dados. Verifique sua conexão.", "error");
        }

        setIsEditing(null);
        setFormData({ itemName: '', color: '', quantity: '', city: '', supplier: '', unitPrice: '', isBought: false, notes: '' });
      };

      const handleEdit = (item) => {
        setFormData(item);
        setIsEditing(item.id);
        if (formRef.current) {
           formRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      };

      const handleDelete = (id) => {
        setConfirmDialog({
          isOpen: true,
          title: "Excluir Cotação",
          message: "Tem certeza que deseja apagar esta cotação permanentemente? Esta ação não pode ser desfeita.",
          action: async () => {
            try {
              await deleteDoc(doc(db, 'cotacoes', id));
              showToast("Cotação removida com sucesso.");
            } catch (error) {
              showToast("Erro ao remover cotação.", "error");
            }
          }
        });
      };

      const handleDeleteCategory = (categoryName) => {
        const itemsInCategory = items.filter(i => i.itemName.trim().toLowerCase() === categoryName.trim().toLowerCase());
        
        if (itemsInCategory.length > 0) {
          showToast(`Não é possível excluir. Remova as ${itemsInCategory.length} cotações de "${categoryName}" primeiro.`, "error");
          return;
        }

        setConfirmDialog({
          isOpen: true,
          title: "Excluir Categoria",
          message: `Tem certeza que deseja remover a categoria vazia "${categoryName}" da sua lista?`,
          action: async () => {
            try {
              setCategoriesList(prev => prev.filter(c => c.toLowerCase() !== categoryName.trim().toLowerCase()));
              showToast(`Categoria "${categoryName}" removida com sucesso.`);
            } catch (error) {
              showToast("Erro ao remover a categoria.", "error");
            }
          }
        });
      };

      const toggleBought = async (id, itemName) => {
        const targetItem = items.find(i => i.id === id);
        if (!targetItem) return;

        const newStatus = !targetItem.isBought;
        await updateDoc(doc(db, 'cotacoes', id), { isBought: newStatus });

        if (newStatus) {
          const others = items.filter(i => 
            i.id !== id && 
            i.itemName.trim().toLowerCase() === itemName.trim().toLowerCase() && 
            i.isBought
          );
          
          for (const other of others) {
            await updateDoc(doc(db, 'cotacoes', other.id), { isBought: false });
          }
          showToast(`Item marcado como comprado!`);
        }
      };

      // Função para gerar o Relatório PDF nativo
      const handleExportPDF = () => {
        const isSpent = modalType === 'spent';
        const title = isSpent ? 'Extrato de Compras Fechadas' : 'Previsão de Orçamento';
        const itemsToExport = isSpent ? totals.spentItems : totals.budgetedItems;
        const totalValue = isSpent ? totals.spent : totals.budgeted;
        const themeColor = isSpent ? '#16a34a' : '#d97706'; // Verde para Gastos, Laranja para Previsão

        const htmlContent = `
          <!DOCTYPE html>
          <html>
          <head>
            <title>${title} - Cotações Formatura</title>
            <style>
              body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #374151; padding: 40px; margin: 0; }
              .header { text-align: center; margin-bottom: 40px; }
              .header h1 { color: ${themeColor}; margin: 0 0 10px 0; font-size: 28px; }
              .header p { color: #6b7280; margin: 0; font-size: 14px; }
              table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
              th { background-color: #f3f4f6; color: #4b5563; font-weight: bold; text-align: left; padding: 12px; border-bottom: 2px solid #e5e7eb; font-size: 14px; text-transform: uppercase; }
              td { padding: 12px; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
              .right { text-align: right; }
              .total-row { display: flex; justify-content: flex-end; align-items: center; margin-top: 20px; font-size: 20px; }
              .total-label { font-weight: bold; color: #6b7280; margin-right: 15px; text-transform: uppercase; font-size: 14px; }
              .total-value { font-weight: 900; color: ${themeColor}; font-size: 28px; }
              @media print {
                body { padding: 0; }
              }
            </style>
          </head>
          <body>
            <div class="header">
              <h1>${title}</h1>
              <p>Relatório gerado em ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')}</p>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Fornecedor</th>
                  <th class="right">Quantidade</th>
                  <th class="right">Valor Unit.</th>
                  <th class="right">Total</th>
                </tr>
              </thead>
              <tbody>
                ${itemsToExport.map(item => `
                  <tr>
                    <td><strong>${item.itemName}</strong></td>
                    <td>${item.supplier || 'Não informado'}</td>
                    <td class="right">${item.quantity}</td>
                    <td class="right">${formatCurrency(item.unitPrice)}</td>
                    <td class="right"><strong>${formatCurrency(item.quantity * item.unitPrice)}</strong></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
            <div class="total-row">
              <span class="total-label">Valor Total:</span>
              <span class="total-value">${formatCurrency(totalValue)}</span>
            </div>
            <\\/script>".replace("\\\\", "")
            <script>
              window.onload = function() {
                setTimeout(function() {
                  window.print();
                  window.close();
                }, 300);
              }
            <${'/'}script>
          </body>
          </html>
        `;

        const printWindow = window.open('', '', 'width=800,height=600');
        printWindow.document.open();
        printWindow.document.write(htmlContent);
        printWindow.document.close();
      };

      if (showSplash) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center transition-colors duration-300 dark:bg-[#292D32]">
             <div className="neu-circle p-10 mb-8 animate-bounce text-indigo-500 dark:text-indigo-400">
               <GraduationCap size={72} strokeWidth={1.5} />
             </div>
             <h1 className="text-4xl md:text-5xl font-black text-gray-800 dark:text-gray-100 tracking-tight text-center px-4">
               Cotações Formatura
             </h1>
             <p className="text-gray-500 dark:text-gray-400 mt-4 font-bold tracking-widest uppercase text-sm">Carregando painel...</p>
             <div className="mt-8 flex gap-3">
               <div className="w-3.5 h-3.5 rounded-full bg-indigo-400 animate-pulse"></div>
               <div className="w-3.5 h-3.5 rounded-full bg-indigo-500 animate-pulse" style={{ animationDelay: '0.2s' }}></div>
               <div className="w-3.5 h-3.5 rounded-full bg-indigo-600 animate-pulse" style={{ animationDelay: '0.4s' }}></div>
             </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen font-sans text-gray-700 dark:text-gray-200 pb-12 relative transition-colors duration-300">
          
          {confirmDialog.isOpen && (
            <div className="fixed inset-0 bg-gray-900 bg-opacity-60 backdrop-blur-sm z-[60] flex justify-center items-center p-4">
              <div className="neu-flat p-6 w-full max-w-sm flex flex-col items-center text-center animate-in fade-in zoom-in duration-200">
                 <div className="bg-red-100 dark:bg-red-900/30 text-red-500 dark:text-red-400 p-3 rounded-full mb-4">
                   <AlertTriangle size={32} />
                 </div>
                 <h3 className="text-xl font-bold text-gray-800 dark:text-gray-100 mb-2">{confirmDialog.title}</h3>
                 <p className="text-sm text-gray-600 dark:text-gray-400 mb-6 font-medium">{confirmDialog.message}</p>
                 <div className="flex w-full gap-4">
                   <button 
                     onClick={() => setConfirmDialog({ isOpen: false, title: '', message: '', action: null })} 
                     className="neu-btn flex-1 py-3 text-gray-600 dark:text-gray-400 font-bold hover:text-gray-800 dark:hover:text-gray-200"
                   >
                     Cancelar
                   </button>
                   <button 
                     onClick={() => { 
                       confirmDialog.action(); 
                       setConfirmDialog({ isOpen: false, title: '', message: '', action: null }); 
                     }} 
                     className="neu-btn flex-1 py-3 text-red-600 dark:text-red-400 font-bold"
                   >
                     Sim, Excluir
                   </button>
                 </div>
              </div>
            </div>
          )}

          {toastMessage && (
            <div className={`fixed top-4 right-4 z-50 px-6 py-3 rounded-xl shadow-lg transition-all duration-300 flex items-center gap-3 font-bold text-sm
              ${toastMessage.type === 'error' ? 'bg-red-500 text-white' : 'neu-flat text-indigo-600 dark:text-indigo-400'}`}>
              {toastMessage.type === 'error' ? <X size={18} /> : <CheckCircle size={18} />}
              {toastMessage.message}
            </div>
          )}

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8">
            
            <header className="flex flex-col md:flex-row items-center justify-between mb-8 gap-6">
              <div className="flex items-center justify-between w-full md:w-auto">
                <div className="flex items-center space-x-4">
                  <div className="neu-flat p-4 text-indigo-500 dark:text-indigo-400 rounded-full flex items-center justify-center relative">
                    <GraduationCap size={36} strokeWidth={1.5} />
                    <div className={`absolute top-0 right-0 w-3 h-3 rounded-full border-2 border-[#E0E5EC] dark:border-[#292D32] ${isReady ? 'bg-green-500' : 'bg-amber-500 animate-pulse'}`} title={isReady ? "Online" : "Conectando"}></div>
                  </div>
                  <div>
                    <h1 className="text-3xl font-extrabold text-gray-800 dark:text-gray-100 tracking-tight">Cotações Formatura</h1>
                    <p className="text-gray-500 dark:text-gray-400 text-sm font-medium">Comparativo e Gestão de Fornecedores</p>
                  </div>
                </div>
                
                {/* Botão Tema (Mobile visível aqui, esconde no desktop para por do lado) */}
                <button onClick={toggleTheme} className="neu-circle p-3 md:hidden text-gray-500 dark:text-gray-400">
                  {isDark ? <Sun size={20} /> : <Moon size={20} />}
                </button>
              </div>

              <div className="flex items-center space-x-4 w-full md:w-auto">
                {/* Botão Tema (Desktop) */}
                <button onClick={toggleTheme} className="neu-circle p-3 hidden md:block text-gray-500 dark:text-gray-400" title="Mudar Tema">
                  {isDark ? <Sun size={20} /> : <Moon size={20} />}
                </button>

                <div 
                  onClick={() => totals.spentItems.length > 0 && setModalType('spent')}
                  className={`neu-flat px-6 py-4 flex-1 md:w-56 flex flex-col items-center justify-center border-t-4 border-green-500 transition-transform ${totals.spentItems.length > 0 ? 'cursor-pointer hover:scale-105' : 'opacity-70'}`}
                >
                  <span className="text-xs uppercase tracking-wider text-gray-600 dark:text-gray-400 font-bold mb-1 flex items-center">
                    <Wallet size={14} className="mr-1.5 text-green-600 dark:text-green-500" /> Já Gasto
                  </span>
                  <span className="text-2xl font-black text-green-600 dark:text-green-400">{formatCurrency(totals.spent)}</span>
                  <span className="text-[10px] text-green-700 dark:text-green-300 mt-1 font-bold bg-green-200 dark:bg-green-900/40 px-2 py-0.5 rounded-full">
                    {totals.spentItems.length} {totals.spentItems.length === 1 ? 'item fechado' : 'itens fechados'}
                  </span>
                </div>
                
                <div 
                  onClick={() => totals.budgetedItems.length > 0 && setModalType('budgeted')}
                  className={`neu-flat px-6 py-4 flex-1 md:w-56 flex flex-col items-center justify-center border-t-4 border-amber-400 transition-transform ${totals.budgetedItems.length > 0 ? 'cursor-pointer hover:scale-105' : 'opacity-70'}`}
                >
                  <span className="text-xs uppercase tracking-wider text-gray-600 dark:text-gray-400 font-bold mb-1 flex items-center">
                    <ListTodo size={14} className="mr-1.5 text-amber-500" /> Previsão Extra
                  </span>
                  <span className="text-2xl font-black text-amber-500 dark:text-amber-400">{formatCurrency(totals.budgeted)}</span>
                  <span className="text-[10px] text-gray-500 dark:text-gray-400 mt-1 leading-tight text-center font-medium">Clique para ver detalhes</span>
                </div>
              </div>
            </header>

            <div className="neu-flat p-6 mb-8 relative z-10 scroll-mt-6" ref={formRef}>
              <h2 className="text-lg font-bold text-gray-800 dark:text-gray-100 mb-5 flex items-center border-b border-gray-300 dark:border-gray-700 pb-3">
                {isEditing ? <Edit3 size={20} className="mr-2 text-indigo-500 dark:text-indigo-400" /> : <Plus size={20} className="mr-2 text-indigo-500 dark:text-indigo-400" />}
                {isEditing ? 'Atualizar Cotação' : 'Adicionar Nova Cotação'}
              </h2>
              
              <form onSubmit={handleSubmit} className="space-y-4">
                <div className="grid grid-cols-1 md:grid-cols-12 gap-4">
                  <div className="md:col-span-3 relative">
                    <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1 pl-1 uppercase tracking-wide">Item de Compra *</label>
                    <div className="relative">
                      <input type="text" name="itemName" value={formData.itemName} 
                        onChange={(e) => { handleInputChange(e); setIsDropdownOpen(true); }} 
                        onFocus={() => setIsDropdownOpen(true)}
                        onBlur={() => setTimeout(() => setIsDropdownOpen(false), 200)}
                        required autoComplete="off"
                        className="neu-pressed w-full px-4 py-2.5 text-sm text-gray-800 dark:text-gray-200 font-medium" placeholder="Ex: Copo Térmico" />
                      
                      {isDropdownOpen && (
                        <ul className="absolute z-50 w-full mt-2 max-h-56 overflow-y-auto neu-flat p-2 border border-gray-300 dark:border-gray-700">
                          {categoriesList
                            .filter(item => item.toLowerCase().includes(formData.itemName.toLowerCase()))
                            .map((item, index) => (
                              <li 
                                key={index}
                                onMouseDown={(e) => {
                                  e.preventDefault(); 
                                  setFormData(prev => ({ ...prev, itemName: item }));
                                  setIsDropdownOpen(false);
                                }}
                                className="px-4 py-2.5 text-sm text-gray-700 dark:text-gray-300 cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors font-bold flex items-center"
                              >
                                <Tag size={14} className="mr-2 text-indigo-500 dark:text-indigo-400" />
                                {item}
                              </li>
                            ))}
                        </ul>
                      )}
                    </div>
                  </div>
                  <div className="md:col-span-2">
                    <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1 pl-1 uppercase tracking-wide">Cor / Modelo</label>
                    <input type="text" name="color" value={formData.color} onChange={handleInputChange} 
                      className="neu-pressed w-full px-4 py-2.5 text-sm text-gray-800 dark:text-gray-200" placeholder="Ex: Dourado" />
                  </div>
                  <div className="md:col-span-2">
                    <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1 pl-1 uppercase tracking-wide">Qtd. *</label>
                    <input type="number" name="quantity" value={formData.quantity} onChange={handleInputChange} required min="1"
                      className="neu-pressed w-full px-4 py-2.5 text-sm text-gray-800 dark:text-gray-200" placeholder="0" />
                  </div>
                  <div className="md:col-span-3">
                    <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1 pl-1 uppercase tracking-wide">Fornecedor</label>
                    <input type="text" name="supplier" value={formData.supplier} onChange={handleInputChange}
                      className="neu-pressed w-full px-4 py-2.5 text-sm text-gray-800 dark:text-gray-200" placeholder="Nome da empresa" />
                  </div>
                  <div className="md:col-span-2">
                    <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1 pl-1 uppercase tracking-wide">Localidade</label>
                    <input type="text" name="city" value={formData.city} onChange={handleInputChange}
                      className="neu-pressed w-full px-4 py-2.5 text-sm text-gray-800 dark:text-gray-200" placeholder="Cidade/Estado" />
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                  <div className="md:col-span-2">
                    <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1 pl-1 uppercase tracking-wide">Preço Unid. (R$) *</label>
                    <input type="number" step="0.01" name="unitPrice" value={formData.unitPrice} onChange={handleInputChange} required
                      className="neu-pressed w-full px-4 py-2.5 text-sm text-gray-800 dark:text-gray-200 font-bold" placeholder="0.00" />
                  </div>
                  <div className="md:col-span-5">
                    <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1 pl-1 uppercase tracking-wide">Observações Extras</label>
                    <input type="text" name="notes" value={formData.notes} onChange={handleInputChange}
                      className="neu-pressed w-full px-4 py-2.5 text-sm text-gray-800 dark:text-gray-200" placeholder="Incluso frete? Prazo de entrega?" />
                  </div>
                  <div className="md:col-span-2 flex flex-col justify-end pb-0">
                    <label className="block text-xs font-bold text-transparent mb-1 pl-1 select-none hidden md:block">Ação</label>
                    <button 
                      type="button" 
                      onClick={() => setFormData(prev => ({ ...prev, isBought: !prev.isBought }))}
                      className={`neu-btn w-full h-[42px] flex items-center justify-center space-x-2 transition-all duration-300 ${formData.isBought ? 'text-green-600 dark:text-green-400 neu-pressed' : 'text-gray-500 dark:text-gray-400'}`}
                    >
                      {formData.isBought ? <CheckCircle size={18} /> : <Circle size={18} />}
                      <span className="font-bold text-xs uppercase tracking-wide">
                        {formData.isBought ? 'Já Comprei' : 'Apenas Orçamento'}
                      </span>
                    </button>
                  </div>
                  <div className="md:col-span-3 flex space-x-3 items-end">
                    <button type="submit" className="neu-btn w-full h-[42px] text-indigo-600 dark:text-indigo-400 uppercase text-xs tracking-wider font-extrabold hover:text-indigo-700 dark:hover:text-indigo-300">
                      {isEditing ? 'Salvar Edição' : 'Registrar'}
                    </button>
                    {isEditing && (
                      <button type="button" onClick={() => { setIsEditing(null); setFormData({itemName: '', color: '', quantity: '', city: '', supplier: '', unitPrice: '', isBought: false, notes: ''}); }}
                        className="neu-btn w-full py-2.5 text-gray-600 dark:text-gray-400 uppercase text-xs tracking-wider">
                        Cancelar
                      </button>
                    )}
                  </div>
                </div>
              </form>
            </div>

            {/* Barra de Ferramentas / Filtros */}
            <div className="flex flex-col sm:flex-row justify-between items-center mb-4 gap-4 px-2">
              <h3 className="text-xl font-bold text-gray-800 dark:text-gray-100">Tabela de Comparação</h3>
              
              <div className="relative w-full sm:w-72">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <Search size={16} className="text-gray-400" />
                </div>
                <input 
                  type="text" 
                  placeholder="Buscar fornecedor ou item..." 
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  className="neu-pressed w-full pl-10 pr-4 py-2 text-sm text-gray-700 dark:text-gray-300 font-medium"
                />
                {searchTerm && (
                  <button onClick={() => setSearchTerm('')} className="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                    <X size={14} />
                  </button>
                )}
              </div>
            </div>

            <div className="neu-flat overflow-hidden rounded-2xl">
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse min-w-[1100px]">
                  <thead>
                    <tr className="text-gray-600 dark:text-gray-400 uppercase text-[10px] tracking-widest" style={{ backgroundColor: 'var(--table-head)' }}>
                      <th className="p-4 font-extrabold w-12 text-center">Status</th>
                      <th className="p-4 font-extrabold">Fornecedor</th>
                      <th className="p-4 font-extrabold">Localidade</th>
                      <th className="p-4 font-extrabold">Cor Desejada</th>
                      <th className="p-4 font-extrabold text-right">Qtd</th>
                      <th className="p-4 font-extrabold text-right">Preço Unit.</th>
                      <th className="p-4 font-extrabold text-right">Preço Total</th>
                      <th className="p-4 font-extrabold text-center w-32">Análise</th>
                      <th className="p-4 font-extrabold w-48">Observações</th>
                      <th className="p-4 font-extrabold text-center w-24">Ações</th>
                    </tr>
                  </thead>
                  <tbody className="text-sm">
                    {groupedItems.length === 0 ? (
                       <tr>
                         <td colSpan={10} className="p-12 text-center text-gray-500 dark:text-gray-400 font-bold flex flex-col items-center justify-center">
                           <Info size={40} className="mb-3 text-gray-400" />
                           Nenhum resultado encontrado.
                         </td>
                       </tr>
                    ) : (
                      groupedItems.map((group, groupIndex) => (
                        <React.Fragment key={groupIndex}>
                          <tr className="border-y border-gray-300 dark:border-gray-700" style={{ backgroundColor: 'var(--neu-bg)', filter: 'brightness(0.95)' }}>
                            <td colSpan={10} className="px-5 py-3 flex items-center justify-between">
                              <div className="font-black text-gray-800 dark:text-gray-100 text-base flex items-center">
                                <Tag size={18} className="mr-2 text-indigo-600 dark:text-indigo-400" />
                                {group.originalName}
                                {/* MODIFICAÇÃO DO BADGE DE COTAÇÕES AQUI */}
                                <span className={`ml-3 text-xs font-bold px-2.5 py-1 rounded-full ${group.items.length === 0 ? 'bg-amber-100 text-amber-700 dark:bg-amber-900/60 dark:text-amber-300' : 'bg-gray-200/80 text-gray-700 dark:bg-gray-700 dark:text-gray-100 shadow-inner'}`}>
                                  {group.items.length} {group.items.length === 1 ? 'cotação' : 'cotações'}
                                </span>
                              </div>
                              <button 
                                onClick={() => handleDeleteCategory(group.originalName)} 
                                className="text-gray-400 hover:text-red-500 transition-colors p-1.5 rounded-full hover:bg-red-100 dark:hover:bg-red-900/30 flex items-center" 
                                title="Excluir Categoria"
                              >
                                <Trash2 size={16} />
                              </button>
                            </td>
                          </tr>

                          {group.items.length === 0 ? (
                            <tr className="table-row-neu">
                              <td colSpan={10} className="p-5 text-center text-gray-500 dark:text-gray-500 text-sm font-medium">
                                Nenhum fornecedor registado.
                              </td>
                            </tr>
                          ) : (
                            group.items.map((item) => {
                              const total = item.quantity * item.unitPrice;
                              const isBestPrice = Number(item.unitPrice) === group.minPrice && group.items.length > 1;
                              const isWorstPrice = Number(item.unitPrice) === group.maxPrice && group.items.length > 1 && group.minPrice !== group.maxPrice;
                              const isGroupResolved = group.items.some(i => i.isBought);

                              let rowClass = "table-row-neu transition-all duration-300 ";
                              if (isGroupResolved) {
                                if (item.isBought) {
                                  rowClass += "bg-green-300/50 dark:bg-green-900/30"; 
                                } else {
                                  rowClass += "bg-red-300/30 dark:bg-red-900/10 opacity-60 hover:opacity-100 grayscale"; 
                                }
                              }

                              return (
                                <tr key={item.id} className={rowClass}>
                                  <td className="p-3 text-center">
                                    <button onClick={() => toggleBought(item.id, item.itemName)} className={`neu-circle p-2 flex items-center justify-center mx-auto transition-colors ${item.isBought ? 'text-green-600 dark:text-green-400 shadow-[inset_3px_3px_6px_var(--neu-shadow-d-in),inset_-3px_-3px_6px_var(--neu-shadow-l-in)]' : 'text-gray-400 hover:text-indigo-500 dark:hover:text-indigo-400'}`} title={item.isBought ? "Desmarcar" : "Marcar como Comprado"}>
                                      {item.isBought ? <CheckCircle size={20} fill="currentColor" className="text-green-500 dark:text-green-400" /> : <Circle size={20} />}
                                    </button>
                                  </td>
                                  <td className="p-3 font-bold text-gray-800 dark:text-gray-200">{item.supplier || '-'}</td>
                                  <td className="p-3 text-gray-600 dark:text-gray-400 text-xs font-medium">{item.city || '-'}</td>
                                  <td className="p-3 text-gray-700 dark:text-gray-300 font-medium">{item.color || '-'}</td>
                                  <td className="p-3 text-right font-bold text-gray-700 dark:text-gray-300">{item.quantity}</td>
                                  <td className="p-3 text-right text-gray-700 dark:text-gray-300 font-medium">{formatCurrency(item.unitPrice)}</td>
                                  <td className="p-3 text-right font-black text-gray-800 dark:text-gray-100">{formatCurrency(total)}</td>
                                  
                                  <td className="p-3 text-center">
                                    {isBestPrice && (
                                      <div className="neu-badge-green px-3 py-1.5 flex items-center justify-center text-green-700 dark:text-green-400 text-[10px] font-extrabold uppercase tracking-wide mx-auto w-max">
                                        <TrendingDown size={12} className="mr-1" strokeWidth={3} /> Mais Barato
                                      </div>
                                    )}
                                    {isWorstPrice && (
                                      <div className="neu-badge-red px-3 py-1.5 flex items-center justify-center text-red-600 dark:text-red-400 text-[10px] font-extrabold uppercase tracking-wide mx-auto w-max">
                                        <TrendingUp size={12} className="mr-1" strokeWidth={3} /> Mais Caro
                                      </div>
                                    )}
                                    {!isBestPrice && !isWorstPrice && <span className="text-gray-400 dark:text-gray-500 text-xs font-bold">-</span>}
                                  </td>

                                  <td className="p-3 text-xs text-gray-600 dark:text-gray-400 italic truncate max-w-[200px]" title={item.notes}>
                                    {item.notes || '-'}
                                  </td>

                                  <td className="p-3">
                                    <div className="flex justify-center space-x-4">
                                      <button onClick={() => handleEdit(item)} className="text-gray-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors" title="Editar">
                                        <Edit3 size={18} />
                                      </button>
                                      <button onClick={() => handleDelete(item.id)} className="text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors" title="Remover">
                                        <Trash2 size={18} />
                                      </button>
                                    </div>
                                  </td>
                                </tr>
                              );
                            })
                          )}
                        </React.Fragment>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            </div>

            {/* MODAL DAS LISTAS DE COTAÇÕES */}
            {modalType && (
              <div className="fixed inset-0 bg-gray-900 bg-opacity-60 backdrop-blur-md z-50 flex justify-center items-center p-4">
                <div className="neu-flat p-6 w-full max-w-3xl max-h-[85vh] flex flex-col relative">
                  <button onClick={() => setModalType(null)} className="neu-circle p-2 absolute top-4 right-4 text-gray-600 dark:text-gray-400 hover:text-red-600 dark:hover:text-red-400 transition-colors">
                    <X size={20} strokeWidth={2.5} />
                  </button>

                  <div className="mb-6 pr-8">
                    <h2 className="text-2xl font-extrabold text-gray-800 dark:text-gray-100 flex items-center">
                      {modalType === 'spent' ? (
                        <><Wallet className="mr-3 text-green-600 dark:text-green-400" size={28} /> Extrato de Compras Fechadas</>
                      ) : (
                        <><ListTodo className="mr-3 text-amber-500 dark:text-amber-400" size={28} /> Lista de Previsão de Orçamento</>
                      )}
                    </h2>
                    <p className="text-sm text-gray-600 dark:text-gray-400 mt-2 font-medium">
                      {modalType === 'spent' 
                        ? 'Estes são os fornecedores que você registrou como "Comprado" e que formam o seu gasto real até o momento.' 
                        : 'Esta é a simulação do seu orçamento ideal, usando automaticamente a opção MAIS BARATA dos itens que ainda não foram comprados.'}
                    </p>
                  </div>

                  <div className="overflow-y-auto flex-1 pr-2 rounded-xl mb-2">
                    <div className="space-y-4">
                      {(modalType === 'spent' ? totals.spentItems : totals.budgetedItems).map((item) => (
                        <div key={item.id} className="neu-pressed p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                          <div className="flex items-center gap-3">
                            <div className={`p-2 rounded-full shadow-[inset_3px_3px_6px_var(--neu-shadow-d-in),inset_-3px_-3px_6px_var(--neu-shadow-l-in)] ${modalType === 'spent' ? 'text-green-600 dark:text-green-400' : 'text-amber-600 dark:text-amber-400'}`}>
                              <Tag size={16} />
                            </div>
                            <div>
                              <h4 className="font-bold text-gray-800 dark:text-gray-100 text-base">{item.itemName}</h4>
                              <p className="text-xs text-gray-600 dark:text-gray-400 font-medium">{item.supplier || 'Fornecedor não informado'} • {item.quantity} un.</p>
                            </div>
                          </div>
                          <div className="text-right w-full sm:w-auto">
                            <p className="font-black text-gray-800 dark:text-gray-100 text-lg">{formatCurrency(item.quantity * item.unitPrice)}</p>
                            <p className="text-[10px] text-gray-500 dark:text-gray-400 font-bold uppercase tracking-wider">{formatCurrency(item.unitPrice)} unitário</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* RODAPÉ DO MODAL (TOTAL + BOTÃO DE EXPORTAR) */}
                  <div className="mt-4 pt-4 border-t border-gray-300 dark:border-gray-700 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div>
                      <span className="font-bold text-gray-600 dark:text-gray-400 uppercase tracking-widest text-xs block mb-1">Total acumulado:</span>
                      <span className={`text-3xl font-black ${modalType === 'spent' ? 'text-green-600 dark:text-green-400' : 'text-amber-500 dark:text-amber-400'}`}>
                        {formatCurrency(modalType === 'spent' ? totals.spent : totals.budgeted)}
                      </span>
                    </div>
                    
                    <button 
                      onClick={handleExportPDF} 
                      className="neu-btn px-5 py-3 flex items-center justify-center text-sm font-bold text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 w-full sm:w-auto"
                    >
                      <Printer size={18} className="mr-2" /> Salvar / Imprimir PDF
                    </button>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
